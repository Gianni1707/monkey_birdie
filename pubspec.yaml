name: monkey_bird
description: "App di bird watching: riconoscimento on-device, collezione, mappa e social."
publish_to: "none"
version: 1.2.2+5

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:        # localizzazione IT/EN (i18n)
    sdk: flutter
  intl: any                     # richiesto da flutter gen-l10n

  # --- Backend / dati ---
  supabase_flutter: ^2.5.6      # auth + Postgres/PostgREST + storage
  http: ^1.2.0                  # thumbnail specie (API iNaturalist) per i candidati
  shared_preferences: ^2.3.0    # persistenza scelta lingua
  share_plus: ^10.0.0           # condividi la scheda specie (web Web Share API + Android)
  url_launcher: ^6.3.0          # apre l'URL dell'APK nel browser (controllo aggiornamenti Android)
  audioplayers: ^6.1.0          # riproduce il verso della specie (xeno-canto) — web + Android

  # --- State management / navigazione ---
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # --- Sensori device ---
  geolocator: ^12.0.0           # GPS dell'avvistamento (posizione NOT NULL)
  permission_handler: ^11.3.1   # permessi microfono + posizione
  record: ^5.1.2                # registrazione microfono (WAV PCM16)
  path_provider: ^2.1.3         # file temporanei audio
  image_picker: ^1.1.2          # scatta/carica foto (camera + galleria, web+android)

  # --- ML on-device ---
  tflite_flutter: ^0.12.0       # inferenza BirdNET audio + AIY Birds foto (.tflite)
  image: ^4.2.0                 # decode + resize immagine on-device (preprocessing foto)

  # --- Modelli / serializzazione ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_map: ^7.0.2
  vector_map_tiles: ^8.0.0
  latlong2: ^0.9.1
  flutter_map_dragmarker: ^7.0.0
  flutter_map_cache: ^1.5.2
  dio_cache_interceptor_hive_store: ^4.0.0
  dio: ^5.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # codegen modelli (freezed + json_serializable)
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # generazione icone app (Android adaptive + web/PWA) da assets/branding/
  flutter_launcher_icons: ^0.14.1


# record_linux 0.7.2 (impl desktop Linux, mai usata: target = Android+Web) non compila
# su Dart 3.12 e blocca il build Android perché il registrant compila TUTTE le impl.
# La forziamo a una versione compilabile senza toccare `record` (web audio invariato).
dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  generate: true                # genera le classi di localizzazione da lib/l10n/*.arb
  assets:
    - assets/models/
    - assets/labels/
    - assets/branding/logo_uccello.png
    - assets/landing/
  # Font bundlati (offline/PWA-safe, nessuna dipendenza runtime). Variabili:
  # il peso si seleziona via fontWeight nel tema. Titoli=serif, corpo=Inter.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/SourceSerif4.ttf

# Icone app (Android adaptive + web/PWA) generate da flutter_launcher_icons.
# Sorgente: quadrato crema a filo (assets/branding/app_icon_prepared.png).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/app_icon_prepared.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FCF5E1"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/branding/app_icon_prepared.png"
    background_color: "#FCF5E1"
    theme_color: "#234F3E"

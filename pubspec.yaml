name: monkey_bird
description: "App di bird watching: riconoscimento on-device, collezione, mappa e social."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Backend / dati ---
  supabase_flutter: ^2.5.6      # auth + Postgres/PostgREST + storage

  # --- State management / navigazione ---
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # --- Sensori device ---
  geolocator: ^12.0.0           # GPS dell'avvistamento (posizione NOT NULL)
  permission_handler: ^11.3.1   # permessi microfono + posizione
  record: ^5.1.2                # registrazione microfono (WAV PCM16)
  path_provider: ^2.1.3         # file temporanei audio

  # --- ML on-device ---
  tflite_flutter: ^0.10.4       # inferenza BirdNET (.tflite)

  # --- Modelli / serializzazione ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # codegen modelli (freezed + json_serializable)
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/labels/

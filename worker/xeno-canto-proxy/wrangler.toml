# Proxy xeno-canto: nasconde la API key (v3) e serve /api/xc sul dominio.
# La key NON sta qui: si imposta come secret ->  wrangler secret put XC_KEY
name = "monkeybirdie-xc"
main = "src/index.js"
compatibility_date = "2024-11-01"
# Espone anche l'URL <name>.<subdomain>.workers.dev, che l'app nativa raggiunge
# (il dominio custom monkeybirdie.com viene invece resettato per i client non-browser).
workers_dev = true

# Gira SOLO sul path /api/xc* del dominio (Pages serve tutto il resto).
# Same-origin per la PWA → niente problemi di CORS lato web.
routes = [
  { pattern = "monkeybirdie.com/api/xc*", zone_name = "monkeybirdie.com" },
  # Proxy GBIF occurrence (Uccelli nei dintorni): evita i 403/CORS lato browser.
  { pattern = "monkeybirdie.com/api/gbif*", zone_name = "monkeybirdie.com" },
  # Notifica email feedback (Database Webhook Supabase → Resend).
  { pattern = "monkeybirdie.com/api/feedback-mail*", zone_name = "monkeybirdie.com" }
]
